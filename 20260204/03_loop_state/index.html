<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>상태 관리 기초 - 목표 달성 카운터</title>

    <!-- [2단계: CSS 디자인] 화면을 예쁘게 꾸미는 단계 -->
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
        }

        h1 {
            color: #2c3e50;
        }

        /* 카운터 숫자를 강조하는 스타일 */
        #counterSection {
            font-size: 30px;
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #countDisplay {
            color: #3498db;
            font-weight: bold;
            font-size: 45px;
        }

        /* 버튼 스타일 */
        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        #addBtn {
            background-color: #2ecc71;
            color: white;
        }

        #addBtn:hover {
            background-color: #27ae60;
        }

        #resetBtn {
            background-color: #e74c3c;
            color: white;
        }

        #resetBtn:hover {
            background-color: #c0392b;
        }

        /* 축하 메시지 스타일 */
        #msgDisplay {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
            color: #ff9f43;
            text-align: center;
            min-height: 40px;
            /* 메시지가 없을 때도 높이 유지 */
        }

        /* [체크포인트 1]: 브라우저에서 버튼 색상과 카운터 박스가 잘 보이는지 확인하세요. */
    </style>
</head>

<body>

    <!-- [1단계: HTML 골격] 화면의 요소를 배치하는 단계 -->
    <h1>열정적인 도전자님, 화이팅! 🚀</h1>

    <div id="counterSection">
        현재 완료: <span id="countDisplay">0</span>회
    </div>

    <div class="btn-group">
        <button id="addBtn">1회 완료</button>
        <button id="resetBtn">초기화</button>
    </div>

    <!-- 미션 달성 시 나타날 공간 -->
    <div id="msgDisplay"></div>

    <!-- [체크포인트 2]: 화면에 '0회'와 버튼 2개가 모두 나타나는지 확인하세요. -->

    <!-- [3단계: JavaScript 기능] 실제 동작을 만드는 단계 -->
    <script>
        // 변수 설정: 현재 횟수를 저장하는 '상태' 변수입니다.
        var currentCount = 0;

        // 1. [입력] "1회 완료" 버튼을 클릭했을 때의 동작
        document.getElementById("addBtn").onclick = function () {

            // --- [처리] 데이터 가공 단계 ---
            // 카운트를 1 증가시키기
            currentCount = currentCount + 1;

            // --- [출력] 화면 업데이트 단계 ---
            // 1. 숫자를 화면에 다시 그리기
            document.getElementById("countDisplay").innerText = currentCount;

            // 2. 만약 10회 이상이면 축하 메시지 보여주기 (조건문 활용)
            if (currentCount >= 10) {
                var msg = "🎉 와우! 정말 대단해요! 목표 10회를 달성하셨습니다! \n 당신의 끈기에 박수를 보냅니다! 👏👏👏";
                document.getElementById("msgDisplay").innerText = msg;
            }

            // [체크포인트 3]: 버튼을 누를 때마다 숫자가 올라가고, 10이 되었을 때 메시지가 나오나요?
        };

        // 2. [입력] "초기화" 버튼을 클릭했을 때의 동작
        document.getElementById("resetBtn").onclick = function () {

            // --- [처리] 데이터를 처음(0)으로 돌리기 ---
            currentCount = 0;

            // --- [출력] 화면을 깨끗하게 비우기 ---
            document.getElementById("countDisplay").innerText = currentCount;
            document.getElementById("msgDisplay").innerText = "";

            // [체크포인트 4]: 초기화 버튼을 누르면 숫자 0과 메시지 삭제가 동시에 이루어지나요?
        };
    </script>
</body>

</html>
