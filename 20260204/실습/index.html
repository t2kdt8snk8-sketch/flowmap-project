<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARCHIVE | Digital Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0a;
            color: #e5e5e5;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-gradient {
            background: linear-gradient(to right, #ffffff, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-hover:hover {
            transform: translateY(-10px);
            border-color: #4f46e5;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>

<body>

    <nav class="fixed w-full z-50 px-8 py-6 flex justify-between items-center glass">
        <div class="text-xl font-bold tracking-tighter">ARCHIVE.01</div>
        <div class="space-x-8 text-sm uppercase tracking-widest hidden md:flex">
            <a href="#" class="hover:text-indigo-400 transition">Collections</a>
            <a href="#" class="hover:text-indigo-400 transition">Studio</a>
            <a href="#" class="hover:text-indigo-400 transition">Contact</a>
        </div>
        <button
            class="px-5 py-2 border border-white text-xs uppercase hover:bg-white hover:text-black transition">Menu</button>
    </nav>

    <section class="h-screen flex flex-col justify-center items-center text-center px-4">
        <span class="text-indigo-500 text-sm tracking-[0.5em] uppercase mb-4 opacity-80">2026 Digital Artifacts</span>
        <h1 class="text-6xl md:text-9xl font-bold tracking-tighter mb-8 text-gradient">
            STREET <br> MINIMALISM
        </h1>
        <p class="max-w-md text-gray-400 font-light leading-relaxed">
            단순함 속에 숨겨진 정교한 디테일. <br>
            데이터와 디자인의 경계를 허무는 새로운 시각적 경험.
        </p>
        <div class="mt-12 animate-bounce">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 13l5 5 5-5M7 6l5 5 5-5" />
            </svg>
        </div>
    </section>

    <section class="px-8 py-24 bg-[#0d0d0d]">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="card-hover p-8 glass flex flex-col justify-between h-[400px]">
                <div>
                    <span class="text-xs text-indigo-400">001</span>
                    <h3 class="text-2xl mt-2 font-medium">Visual Identity</h3>
                </div>
                <p class="text-sm text-gray-500 italic">"The essence of form is function."</p>
            </div>
            <div class="card-hover p-8 glass flex flex-col justify-between h-[400px]">
                <div>
                    <span class="text-xs text-indigo-400">002</span>
                    <h3 class="text-2xl mt-2 font-medium">Data Analysis</h3>
                </div>
                <div class="w-full h-1 bg-gray-800">
                    <div class="w-2/3 h-full bg-indigo-500"></div>
                </div>
            </div>
            <div class="card-hover p-8 glass flex flex-col justify-between h-[400px]">
                <div>
                    <span class="text-xs text-indigo-400">003</span>
                    <h3 class="text-2xl mt-2 font-medium">Archive Study</h3>
                </div>
                <button class="text-xs border-b border-indigo-500 pb-1 self-start">VIEW MORE</button>
            </div>
        </div>
    </section>

    <footer
        class="py-12 px-8 border-t border-gray-900 flex justify-between items-center text-[10px] text-gray-600 uppercase tracking-[0.3em]">
        <div>© 2026 SOGANG_UNIV_STUDIO</div>
        <div>STAY COLD, STAY SHARP</div>
    </footer>

</body>

</html>
